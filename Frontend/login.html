<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="wooble_image/images.jpg">
    <title>Jobs - sign in | Wooble</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="wb-navbar navbar">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html" style="margin-left: -50px;">
    <img src="wooble_image/wooble_logo_blue_1.png" alt="Wooble Jobs" style="height:30px; width:auto;">
</a>
        <a href="register.html" class="btn-wb-outline">Create Account</a>
    </div>
</nav>

<!-- Auth Wrapper -->
<div class="auth-wrapper">
    <div class="wb-auth-card">

        <!-- Header -->
        <div class="text-center mb-4">
            <div style="font-size:48px;margin-bottom:12px;">👋</div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to your Wooble Jobs account</p>
        </div>

        <!-- Alert -->
        <div id="authAlert" class="wb-alert"></div>

        <!-- Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">

            <div class="wb-form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="wb-form-control"
                       placeholder="your@email.com" required>
            </div>

            <div class="wb-form-group">
                <label>Password</label>
                <div class="position-relative">
                    <input type="password" id="password" class="wb-form-control"
                           placeholder="Enter your password" required>
                    <button type="button"
                            onclick="togglePassword('password', this)"
                            style="position:absolute;right:14px;top:50%;transform:translateY(-50%);
                                   background:none;border:none;color:var(--text-light);cursor:pointer;">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-wb-primary w-100 py-3 mt-2" id="loginBtn">
                Sign In
            </button>

        </form>

        <!-- Divider -->
        <div class="text-center my-4" style="position:relative;">
            <hr style="border-color:var(--border);">
            <span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                         background:var(--white);padding:0 12px;font-size:13px;color:var(--text-light);">
                OR
            </span>
        </div>

        <!-- Demo accounts -->
        <div class="row g-2 mb-4">
            <div class="col-6">
                <button onclick="fillDemo('admin')"
                        class="btn-wb-outline w-100"
                        style="font-size:13px;padding:8px;">
                    🔑 Demo Admin
                </button>
            </div>
            <div class="col-6">
                <button onclick="fillDemo('candidate')"
                        class="btn-wb-outline w-100"
                        style="font-size:13px;padding:8px;">
                    👤 Demo Candidate
                </button>
            </div>
        </div>

        <p class="text-center mb-0" style="font-size:14px;color:var(--text-light);">
            Don't have an account?
            <a href="register.html" class="fw-600">Create one free</a>
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script>

    // Redirect if already logged in
    document.addEventListener("DOMContentLoaded", () => {
        if (Auth.isLoggedIn()) {
            redirectToDashboard();
        }
    });

    // ── Handle Login ──────────────────────
    async function handleLogin(e) {
        e.preventDefault();

        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn      = document.getElementById("loginBtn");

        // Loading state
        btn.innerHTML  = '<span class="wb-spinner"></span> Signing in...';
        btn.disabled   = true;

        const { status, data } = await apiRequest("/auth/login", "POST", { email, password });

        btn.innerHTML = "Sign In";
        btn.disabled  = false;

        if (!data.success) {
            showAlert("authAlert", data.message, "danger");
            return;
        }

        // Save token & user
        Auth.setToken(data.data.token);
        Auth.setUser(data.data.user);

        showAlert("authAlert", "Login successful! Redirecting...", "success");

        setTimeout(() => redirectToDashboard(), 1000);
    }

    // ── Redirect based on role ────────────
    function redirectToDashboard() {
        if (Auth.isAdmin()) {
            window.location.href = "admin/dashboard.html";
        } else {
            window.location.href = "candidate/dashboard.html";
        }
    }

    // ── Toggle password visibility ────────
    function togglePassword(id, btn) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type    = "text";
            btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
        } else {
            input.type    = "password";
            btn.innerHTML = '<i class="bi bi-eye"></i>';
        }
    }

    // ── Fill demo credentials ─────────────
    function fillDemo(role) {
        if (role === "admin") {
            document.getElementById("email").value    = "admin@wooble.com";
            document.getElementById("password").value = "admin123";
        } else {
            document.getElementById("email").value    = "john@example.com";
            document.getElementById("password").value = "123456";
        }
    }

</script>
</body>
</html>
