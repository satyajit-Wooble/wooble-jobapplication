# ============================================
# WOOBLE JOB APPLICATION — DOCKER COMPOSE
# ============================================

version: '3.8'

services:

  # ── PHP + Apache ──────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: wooble_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html
      - ./docker/php/apache.conf:/etc/apache2/sites-enabled/000-default.conf
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wooble_network

  # ── MySQL ─────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: wooble_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - wooble_mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wooble_network

  # ── phpMyAdmin ────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: wooble_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST:             mysql
      PMA_PORT:             3306
      MYSQL_ROOT_PASSWORD:  ${DB_ROOT_PASSWORD}
      PMA_ARBITRARY:        1
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wooble_network

# ── Volumes ───────────────────────────────
volumes:
  wooble_mysql_data:
    driver: local

# ── Networks ──────────────────────────────
networks:
  wooble_network:
    driver: bridge