# ============================================
# WOOBLE JOB — APACHE VIRTUAL HOST CONFIG
# ============================================

<VirtualHost *:80>

    ServerAdmin  webmaster@localhost
    DocumentRoot /var/www/html
    ServerName   localhost

    # ── Main Directory ────────────────────
    <Directory /var/www/html>
        Options       -Indexes +FollowSymLinks
        AllowOverride All
        Require       all granted

        <IfModule mod_rewrite.c>
            RewriteEngine On
        </IfModule>
    </Directory>

    # ── Frontend Directory ────────────────
    <Directory /var/www/html/frontend>
        Options       -Indexes +FollowSymLinks
        AllowOverride All
        Require       all granted
    </Directory>

    # ── API Directory ─────────────────────
    <Directory /var/www/html/api>
        Options       -Indexes +FollowSymLinks
        AllowOverride All
        Require       all granted
    </Directory>

    # ── Uploads Directory ─────────────────
    <Directory /var/www/html/uploads>
        Options       -Indexes
        AllowOverride None
        Require       all granted
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    # ── Logs ──────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>